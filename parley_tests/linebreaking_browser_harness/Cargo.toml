[package]
name = "parley_linebreaking_browser_harness"
description = "Shared in-browser Chrome line-breaking measurement for the Parley harness pages."
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = false

[dependencies]
parley_linebreaking_cases = { workspace = true }
wasm-bindgen = "0.2.100"
wasm-bindgen-futures = "0.4.50"
js-sys = "0.3.77"

[dependencies.web-sys]
version = "0.3.77"
features = [
    "Window",
    "Document",
    "Element",
    "HtmlElement",
    "Node",
    "Range",
    "DomRect",
    "CssStyleDeclaration",
    "FontFace",
    "FontFaceSet",
]

[lints]
workspace = true
