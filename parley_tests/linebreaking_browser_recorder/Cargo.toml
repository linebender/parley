[package]
name = "parley_linebreaking_browser_recorder"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = false

[dependencies]
parley_linebreaking_cases = { workspace = true }
wasm-bindgen = "0.2.100"
wasm-bindgen-futures = "0.4.50"
js-sys = "0.3.77"
console_error_panic_hook = "0.1.7"

[dependencies.web-sys]
version = "0.3.77"
features = [
    "Window",
    "Document",
    "Element",
    "HtmlElement",
    "Node",
    "Range",
    "DomRect",
    "CssStyleDeclaration",
    "EventTarget",
    "FontFace",
    "FontFaceSet",
    "Location",
    "Navigator",
    "Clipboard",
    "console",
]

[lints]
workspace = true
